<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMatch AI - Higher Education Profile Matcher & Predictive Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased">

    <nav class="border-b border-slate-800 bg-slate-950/80 backdrop-blur sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-indigo-500/20">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div>
                    <span class="font-extrabold text-lg text-white tracking-wide">UniMatch <span class="text-indigo-400">AI</span></span>
                    <span class="block text-xs text-slate-400">Predictive Higher-Ed Engine</span>
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <div id="auth-unauthenticated" class="flex items-center space-x-3">
                    <button onclick="openAuthModal('signin')" class="px-4 py-2 text-sm font-medium text-slate-300 hover:text-white transition">
                        Sign In
                    </button>
                    <button onclick="openAuthModal('signup')" class="px-4 py-2 text-sm font-medium bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg shadow-lg shadow-indigo-600/30 transition">
                        Get Started
                    </button>
                </div>
                <div id="auth-authenticated" class="hidden items-center space-x-3">
                    <div class="flex items-center space-x-2 bg-slate-800/80 px-3 py-1.5 rounded-lg border border-slate-700">
                        <div id="user-avatar" class="w-7 h-7 rounded-full bg-indigo-500 flex items-center justify-center text-xs font-bold text-white uppercase">
                            U
                        </div>
                        <span id="user-display-name" class="text-sm font-medium text-slate-200">User</span>
                    </div>
                    <button onclick="handleLogout()" class="text-slate-400 hover:text-rose-400 p-2 text-sm transition" title="Log Out">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 space-y-10">
        <header class="text-center max-w-3xl mx-auto space-y-3">
            <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-white">
                AI-Powered <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400">Higher Education Matching</span>
            </h1>
            <p class="text-slate-400 text-base sm:text-lg">
                Utilizing LLM inference and proportional dynamic matrix evaluations to match applicants and institutions seamlessly.
            </p>
        </header>

        <div class="bg-slate-950/60 border border-slate-800 rounded-2xl p-6 sm:p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <i class="fa-solid fa-sliders text-indigo-400"></i> Student Profile Matcher
            </h2>
            
            <form id="student-match-form" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" onsubmit="event.preventDefault(); runStudentMatch();">
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Unweighted GPA (4.0 Scale)</label>
                    <input type="number" step="0.01" min="0" max="4.0" id="gpa" value="3.75" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">SAT Score (400 - 1600)</label>
                    <input type="number" step="10" min="400" max="1600" id="sat" value="1420" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">ACT Score (1 - 36)</label>
                    <input type="number" min="1" max="36" id="act" value="31" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Target Major</label>
                    <select id="major" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
                        <option value="Computer Science">Computer Science</option>
                        <option value="Business Administration">Business Administration</option>
                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                        <option value="Biology">Biology</option>
                        <option value="Economics">Economics</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Preferred Region</label>
                    <select id="region" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
                        <option value="Northeast">Northeast</option>
                        <option value="West">West</option>
                        <option value="Midwest">Midwest</option>
                        <option value="South">South</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Campus Setting</label>
                    <select id="campus_type" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
                        <option value="Urban">Urban</option>
                        <option value="Suburban">Suburban</option>
                        <option value="Rural">Rural</option>
                    </select>
                </div>

                <div class="sm:col-span-2 lg:col-span-3">
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl shadow-lg shadow-indigo-600/30 transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Calculate University Matches
                    </button>
                </div>
            </form>
        </div>

        <div id="matches-results" class="hidden space-y-6">
            <h3 class="text-xl font-bold text-white">Recommended University Targets</h3>
            <div id="matches-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full p-6 shadow-2xl relative">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white text-lg">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <div class="flex border-b border-slate-800 mb-6">
                <button id="tab-btn-signin" onclick="switchAuthTab('signin')" class="flex-1 pb-3 text-center text-sm font-semibold border-b-2 border-indigo-500 text-indigo-400">
                    Sign In
                </button>
                <button id="tab-btn-signup" onclick="switchAuthTab('signup')" class="flex-1 pb-3 text-center text-sm font-semibold text-slate-400 hover:text-white border-b-2 border-transparent">
                    Sign Up
                </button>
            </div>

            <div id="auth-alert" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

            <form id="form-signin" class="space-y-4" onsubmit="handleEmailSignIn(event)">
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Email Address</label>
                    <input type="email" id="signin-email" required placeholder="student@university.edu" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Password</label>
                    <input type="password" id="signin-password" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg shadow-lg shadow-indigo-600/30 transition">
                    Sign In with Supabase
                </button>
            </form>

            <form id="form-signup" class="space-y-4 hidden" onsubmit="handleEmailSignUp(event)">
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Full Name</label>
                    <input type="text" id="signup-name" required placeholder="Jane Doe" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Email Address</label>
                    <input type="email" id="signup-email" required placeholder="student@university.edu" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1">Password</label>
                    <input type="password" id="signup-password" required minlength="6" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-slate-100 focus:outline-none focus:border-indigo-500">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg shadow-lg shadow-indigo-600/30 transition">
                    Create Account
                </button>
            </form>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-800"></div></div>
                <div class="relative flex justify-center text-xs text-slate-500 uppercase"><span class="bg-slate-900 px-2">Or continue with</span></div>
            </div>

            <div class="flex flex-col items-center">
                <div id="google-signin-btn"></div>
                <button id="google-fallback-btn" onclick="handleGoogleFallback()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 font-medium py-2.5 px-4 rounded-lg flex items-center justify-center gap-3 transition {{ 'hidden' if google_client_id else '' }}">
                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
                    Continue with Google
                </button>
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_CLIENT_ID = "{{ google_client_id or '' }}";
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            initSession();
            waitForGoogleSDK();
        });

        function waitForGoogleSDK(retriesLeft = 20) {
            if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                initGoogleSDK();
            } else if (GOOGLE_CLIENT_ID && retriesLeft > 0) {
                setTimeout(() => waitForGoogleSDK(retriesLeft - 1), 150);
            } else if (GOOGLE_CLIENT_ID) {
                document.getElementById('google-fallback-btn').classList.remove('hidden');
            }
        }

        function initSession() {
            const savedUser = localStorage.getItem('unimatch_user');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    updateAuthUI();
                } catch (e) {
                    localStorage.removeItem('unimatch_user');
                }
            }
        }

        function updateAuthUI() {
            if (currentUser) {
                document.getElementById('auth-unauthenticated').classList.add('hidden');
                document.getElementById('auth-authenticated').classList.remove('hidden');
                document.getElementById('auth-authenticated').classList.add('flex');
                document.getElementById('user-display-name').textContent = currentUser.name || currentUser.email;
                document.getElementById('user-avatar').textContent = (currentUser.name || currentUser.email).charAt(0).toUpperCase();
            } else {
                document.getElementById('auth-unauthenticated').classList.remove('hidden');
                document.getElementById('auth-authenticated').classList.add('hidden');
            }
        }

        function openAuthModal(tab = 'signin') {
            document.getElementById('auth-modal').classList.remove('hidden');
            switchAuthTab(tab);
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
            hideAlert();
        }

        function switchAuthTab(tab) {
            hideAlert();
            if (tab === 'signin') {
                document.getElementById('form-signin').classList.remove('hidden');
                document.getElementById('form-signup').classList.add('hidden');
                document.getElementById('tab-btn-signin').className = "flex-1 pb-3 text-center text-sm font-semibold border-b-2 border-indigo-500 text-indigo-400";
                document.getElementById('tab-btn-signup').className = "flex-1 pb-3 text-center text-sm font-semibold text-slate-400 hover:text-white border-b-2 border-transparent";
            } else {
                document.getElementById('form-signin').classList.add('hidden');
                document.getElementById('form-signup').classList.remove('hidden');
                document.getElementById('tab-btn-signup').className = "flex-1 pb-3 text-center text-sm font-semibold border-b-2 border-indigo-500 text-indigo-400";
                document.getElementById('tab-btn-signin').className = "flex-1 pb-3 text-center text-sm font-semibold text-slate-400 hover:text-white border-b-2 border-transparent";
            }
        }

        function showAlert(msg, isError = true) {
            const el = document.getElementById('auth-alert');
            el.className = `mb-4 p-3 rounded-lg text-sm ${isError ? 'bg-rose-950/60 border border-rose-800 text-rose-300' : 'bg-emerald-950/60 border border-emerald-800 text-emerald-300'}`;
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function hideAlert() {
            document.getElementById('auth-alert').classList.add('hidden');
        }

        async function handleEmailSignIn(e) {
            e.preventDefault();
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Sign in failed');

                currentUser = data.user;
                localStorage.setItem('unimatch_user', JSON.stringify(currentUser));
                updateAuthUI();
                closeAuthModal();
            } catch (err) {
                showAlert(err.message, true);
            }
        }

        async function handleEmailSignUp(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Sign up failed');

                currentUser = data.user;
                localStorage.setItem('unimatch_user', JSON.stringify(currentUser));
                updateAuthUI();
                closeAuthModal();
            } catch (err) {
                showAlert(err.message, true);
            }
        }

        function initGoogleSDK() {
            if (typeof google !== 'undefined' && GOOGLE_CLIENT_ID) {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleCredentialResponse
                });
                google.accounts.id.renderButton(
                    document.getElementById('google-signin-btn'),
                    { theme: 'outline', size: 'large', width: '100%' }
                );
                document.getElementById('google-fallback-btn').classList.add('hidden');
            }
        }

        async function handleGoogleCredentialResponse(response) {
            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ credential: response.credential })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Google auth failed');

                currentUser = data.user;
                localStorage.setItem('unimatch_user', JSON.stringify(currentUser));
                updateAuthUI();
                closeAuthModal();
            } catch (err) {
                showAlert(err.message, true);
            }
        }

        async function handleGoogleFallback() {
            try {
                const res = await fetch('/api/auth/google', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ token: 'simulated_google_token' })
                });
                const data = await res.json();
                currentUser = data.user;
                localStorage.setItem('unimatch_user', JSON.stringify(currentUser));
                updateAuthUI();
                closeAuthModal();
            } catch (err) {
                showAlert(err.message, true);
            }
        }

        async function handleLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch (e) {}
            currentUser = null;
            localStorage.removeItem('unimatch_user');
            updateAuthUI();
        }

        async function runStudentMatch() {
            const payload = {
                gpa: parseFloat(document.getElementById('gpa').value),
                sat: parseInt(document.getElementById('sat').value),
                act: parseInt(document.getElementById('act').value),
                major: document.getElementById('major').value,
                region: document.getElementById('region').value,
                campus_type: document.getElementById('campus_type').value,
                dna: ["STEM", "Research", "Leadership"]
            };

            const res = await fetch('/api/match/student', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            const grid = document.getElementById('matches-grid');
            grid.innerHTML = '';

            data.matches.forEach(m => {
                const colorMap = {
                    emerald: 'border-emerald-500/30 bg-emerald-950/20 text-emerald-400',
                    amber: 'border-amber-500/30 bg-amber-950/20 text-amber-400',
                    rose: 'border-rose-500/30 bg-rose-950/20 text-rose-400'
                };
                const card = document.createElement('div');
                card.className = "bg-slate-950 border border-slate-800 rounded-xl p-5 space-y-3";
                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <h4 class="font-bold text-white text-lg">${m.university}</h4>
                        <span class="text-xs px-2.5 py-1 rounded-full border ${colorMap[m.color] || 'text-indigo-400'} font-semibold">${m.tier}</span>
                    </div>
                    <div class="text-xs text-slate-400 space-y-1">
                        <p><i class="fa-solid fa-location-dot"></i> ${m.region} • ${m.campus_type}</p>
                        <p><i class="fa-solid fa-chart-line"></i> Strategic Probability: <strong class="text-slate-200">${m.probability}%</strong></p>
                    </div>
                    <p class="text-xs text-slate-300 italic border-t border-slate-800 pt-2">${m.reasoning}</p>
                `;
                grid.appendChild(card);
            });

            document.getElementById('matches-results').classList.remove('hidden');
        }
    </script>
</body>
</html>
